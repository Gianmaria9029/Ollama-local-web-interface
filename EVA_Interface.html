<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

<script>
// ── Init CONFIG ──
document.getElementById('host-input').value = CONFIG.hostDefault;
document.getElementById('sys-prompt').value  = CONFIG.systemPrompt;
document.getElementById('tb-nums').textContent = `0 / ${CONFIG.contestoMax} token`;

// ── Stato ──
let cronologia   = [];
let streaming    = false;
let abortCtrl    = null;
let tokenTotali  = 0;

// ── DOM ──
const msgEl       = document.getElementById('messages');
const vuotoEl     = document.getElementById('vuoto');
const inputEl     = document.getElementById('user-input');
const btnInvia    = document.getElementById('btn-invia');
const hostEl      = document.getElementById('host-input');
const modeloEl    = document.getElementById('model-select');
const dotEl       = document.getElementById('status-dot');
const statusEl    = document.getElementById('status-text');
const infoCtx     = document.getElementById('info-contesto');
const sysPromptEl = document.getElementById('sys-prompt');
const sysPanelEl  = document.getElementById('sys-panel');
const tbFill      = document.getElementById('tb-fill');
const tbNums      = document.getElementById('tb-nums');

// ── Helpers ──
function getHost()    { return hostEl.value.trim().replace(/\/$/, ''); }
function getModello() { return modeloEl.value || CONFIG.modelloDefault; }

function setStato(stato, testo) {
  dotEl.className    = 'status-dot ' + stato;
  statusEl.textContent = testo;
}

function mostraVuoto(v) {
  vuotoEl.style.display = v ? 'flex' : 'none';
}

function aggiornaBudget(tokenUsati) {
  const max  = CONFIG.contestoMax;
  const pct  = Math.min(100, Math.round((tokenUsati / max) * 100));
  tbFill.style.width = pct + '%';
  tbFill.className   = 'tb-bar-fill' +
    (pct >= 90 ? ' pieno' : pct >= 70 ? ' alto' : pct >= 45 ? ' medio' : '');
  tbNums.textContent = `${tokenUsati.toLocaleString('it')} / ${max.toLocaleString('it')} token (${pct}%)`;
}

// ── Auto-resize textarea ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!streaming) inviaMess();
  }
});

// ── Connessione ──
async function connetti() {
  setStato('pending', 'connessione…');
  try {
    const r = await fetch(`${getHost()}/api/tags`, {
      signal: AbortSignal.timeout(5000)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data   = await r.json();
    const modelli = data.models || [];

    modeloEl.innerHTML = '';
    if (modelli.length === 0) {
      modeloEl.innerHTML = '<option value="">nessun modello trovato</option>';
    } else {
      modelli.forEach(m => {
        const opt      = document.createElement('option');
        opt.value      = m.name;
        opt.textContent = m.name;
        if (m.name === CONFIG.modelloDefault) opt.selected = true;
        modeloEl.appendChild(opt);
      });
      if (!modeloEl.value) modeloEl.selectedIndex = 0;
    }

    setStato('ok', `connesso — ${modelli.length} modell${modelli.length !== 1 ? 'i' : 'o'}`);
  } catch(e) {
    setStato('err', 'connessione fallita — ' + e.message);
    modeloEl.innerHTML = '<option value="">— connetti prima —</option>';
  }
}

// ── Markdown (senza librerie) ──
function renderMd(testo) {
  let s = testo
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, codice) =>
    `<pre><code class="lang-${lang}">${codice.trim()}</code></pre>`);
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  s = s.replace(/^---$/gm, '<hr>');
  s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  s = s.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  const blockTag = /^<(h[1-3]|ul|ol|li|pre|hr)/;
  const righe = s.split('\n');
  const out   = [];
  let i = 0;
  while (i < righe.length) {
    const r = righe[i];
    if (r.trim() === '') { i++; continue; }
    if (blockTag.test(r.trim())) { out.push(r); i++; continue; }
    const para = [];
    while (i < righe.length && righe[i].trim() !== '' && !blockTag.test(righe[i].trim())) {
      para.push(righe[i++]);
    }
    out.push(`<p>${para.join('<br>')}</p>`);
  }
  return out.join('\n');
}

// ── Render contenuto con think ──
function renderContenuto(el, testo, thinkTesto, thinkDiv, inCorso) {
  el.innerHTML = '';
  if (thinkDiv) {
    el.appendChild(thinkDiv);
    const corpo = thinkDiv.querySelector('.th-corpo');
    if (corpo) corpo.textContent = thinkTesto;
  }
  const div = document.createElement('div');
  div.innerHTML = renderMd(testo);
  el.appendChild(div);
  if (inCorso) {
    const cur = document.createElement('span');
    cur.className = 'cursore';
    el.appendChild(cur);
  }
}

// ── Invia messaggio ──
async function inviaMess() {
  const testo = inputEl.value.trim();
  if (!testo || streaming) return;
  if (!getModello()) { setStato('err', 'nessun modello selezionato'); return; }

  mostraVuoto(false);
  streaming = true;
  btnInvia.textContent = 'Interrompi';
  btnInvia.classList.add('stop');
  btnInvia.onclick = interrompi;

  cronologia.push({ role: 'user', content: testo });

  // Messaggio utente
  const divUtente = document.createElement('div');
  divUtente.className = 'msg user';
  divUtente.innerHTML = `<span class="msg-ruolo">${CONFIG.nomeUtente}</span><span class="msg-testo"></span>`;
  msgEl.appendChild(divUtente);
  divUtente.querySelector('.msg-testo').innerHTML = renderMd(testo);

  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Costruisce array messaggi
  const messaggi = [];
  const sys = sysPromptEl.value.trim();
  if (sys) messaggi.push({ role: 'system', content: sys });
  messaggi.push(...cronologia);

  // Contenitore risposta AI
  const divAI = document.createElement('div');
  divAI.className = 'msg assistant';
  divAI.innerHTML = `<span class="msg-ruolo">${CONFIG.nomeBot}</span><span class="msg-testo"><span class="cursore"></span></span>`;
  msgEl.appendChild(divAI);
  const testoEl = divAI.querySelector('.msg-testo');
  msgEl.scrollTop = msgEl.scrollHeight;

  let testoCompleto = '';
  let thinkTesto    = '';
  let inThink       = false;
  let thinkDiv      = null;
  const inizio      = Date.now();

  abortCtrl = new AbortController();

  try {
    const res = await fetch(`${getHost()}/api/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      signal:  abortCtrl.signal,
      body: JSON.stringify({
        model:   getModello(),
        messages: messaggi,
        stream:  true,
        options: { num_predict: CONFIG.maxToken }
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let tokContati = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = dec.decode(value, { stream: true });
      const righe = chunk.split('\n').filter(l => l.trim());

      for (const riga of righe) {
        let obj;
        try { obj = JSON.parse(riga); } catch { continue; }

        const delta = obj?.message?.content ?? '';
        if (!delta) continue;

        // Parser <think>
        let resto = delta;
        while (resto) {
          if (!inThink) {
            const inizio_t = resto.indexOf('<think>');
            if (inizio_t !== -1) {
              const prima = resto.slice(0, inizio_t);
              if (prima) testoCompleto += prima;
              inThink = true;
              resto   = resto.slice(inizio_t + 7);
              thinkDiv = document.createElement('div');
              thinkDiv.className = 'blocco-think';
              thinkDiv.innerHTML = `<div class="th-header"><span>Ragionamento…</span><span class="th-toggle">▸ espandi</span></div><div class="th-corpo"></div>`;
              thinkDiv.addEventListener('click', () => {
                thinkDiv.classList.toggle('espanso');
                thinkDiv.querySelector('.th-toggle').textContent =
                  thinkDiv.classList.contains('espanso') ? '▾ riduci' : '▸ espandi';
              });
            } else {
              testoCompleto += resto;
              resto = '';
            }
          } else {
            const fine_t = resto.indexOf('</think>');
            if (fine_t !== -1) {
              thinkTesto += resto.slice(0, fine_t);
              inThink     = false;
              resto        = resto.slice(fine_t + 8);
              if (thinkDiv) {
                thinkDiv.querySelector('.th-header span:first-child').textContent = 'Ragionamento';
              }
            } else {
              thinkTesto += resto;
              resto = '';
            }
          }
        }

        renderContenuto(testoEl, testoCompleto, thinkTesto, thinkDiv, !obj.done);

        if (obj.eval_count) {
          tokContati = obj.eval_count;
          aggiornaBudget(tokContati);
        }
        msgEl.scrollTop = msgEl.scrollHeight;
      }
    }

    // Render finale senza cursore
    renderContenuto(testoEl, testoCompleto, thinkTesto, thinkDiv, false);

    const elapsed = ((Date.now() - inizio) / 1000).toFixed(1);
    const tps     = tokContati && elapsed > 0
      ? (tokContati / parseFloat(elapsed)).toFixed(0) : '—';

    const meta = document.createElement('div');
    meta.className   = 'msg-meta';
    meta.textContent = `${tokContati} token · ${elapsed}s · ${tps} tok/s`;
    divAI.appendChild(meta);

    tokenTotali += tokContati;
    cronologia.push({ role: 'assistant', content: testoCompleto });
    aggiornaBudget(tokenTotali);
    infoCtx.textContent = `sessione: ${tokenTotali.toLocaleString('it')} token`;

  } catch(e) {
    if (e.name === 'AbortError') {
      renderContenuto(testoEl, testoCompleto || '// trasmissione interrotta', thinkTesto, thinkDiv, false);
      if (testoCompleto) cronologia.push({ role: 'assistant', content: testoCompleto });
    } else {
      divAI.className = 'msg errore';
      divAI.querySelector('.msg-ruolo').textContent = 'Errore';
      testoEl.textContent = e.message;
      setStato('err', 'richiesta fallita');
      cronologia.pop();
    }
  }

  streaming = false;
  btnInvia.textContent = 'Invia';
  btnInvia.classList.remove('stop');
  btnInvia.onclick = inviaMess;
  abortCtrl = null;
}

function interrompi() {
  if (abortCtrl) abortCtrl.abort();
}

function pulisci() {
  cronologia  = [];
  tokenTotali = 0;
  msgEl.innerHTML = '';
  msgEl.appendChild(vuotoEl);
  mostraVuoto(true);
  infoCtx.textContent = '';
  aggiornaBudget(0);
}

function toggleSys() {
  sysPanelEl.classList.toggle('aperto');
}

// ── Esporta dropdown ──
function toggleEsporta(e) {
  e.stopPropagation();
  document.getElementById('esporta-menu').classList.toggle('aperto');
}

document.addEventListener('click', () => {
  document.getElementById('esporta-menu').classList.remove('aperto');
});

function esporta(formato) {
  document.getElementById('esporta-menu').classList.remove('aperto');

  if (cronologia.length === 0) {
    alert('Nessun messaggio da esportare.');
    return;
  }

  const data = new Date().toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
  const modello = getModello() || 'sconosciuto';

  let contenuto = '';

  if (formato === 'md') {
    contenuto += `# Conversazione Ollama\n`;
    contenuto += `**Data:** ${new Date().toLocaleString('it-IT')}  \n`;
    contenuto += `**Modello:** ${modello}  \n`;
    const sys = sysPromptEl.value.trim();
    if (sys) contenuto += `**Prompt sistema:** ${sys}  \n`;
    contenuto += `\n---\n\n`;
    cronologia.forEach(m => {
      const etichetta = m.role === 'user' ? `**${CONFIG.nomeUtente}**` : `**${CONFIG.nomeBot}**`;
      contenuto += `${etichetta}\n\n${m.content}\n\n---\n\n`;
    });
  } else {
    contenuto += `CONVERSAZIONE OLLAMA\n`;
    contenuto += `Data: ${new Date().toLocaleString('it-IT')}\n`;
    contenuto += `Modello: ${modello}\n`;
    const sys = sysPromptEl.value.trim();
    if (sys) contenuto += `Prompt sistema: ${sys}\n`;
    contenuto += `${'─'.repeat(50)}\n\n`;
    cronologia.forEach(m => {
      const etichetta = m.role === 'user' ? CONFIG.nomeUtente.toUpperCase() : CONFIG.nomeBot.toUpperCase();
      contenuto += `[${etichetta}]\n${m.content}\n\n${'─'.repeat(50)}\n\n`;
    });
  }

  const blob = new Blob([contenuto], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `ollama-chat_${data}.${formato}`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Avvio ──
connetti();
</script>
